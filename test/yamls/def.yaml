openapi: 3.0.0
info:
  title: Sample API
  version: 1.0.0

paths: {}
components:
  schemas:
    NewResourseRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required:
        - name
    NewResourseResponse:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        param:
          type: string
        count:
          type: string
        date:
          type: string
          format: date-time
        date2:
          type: string
          format: date-time
        enum-val:
          type: string
      required:
        - name
        - param
        - count
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message
  responses:
    NotFound:
      description: "Resource not found"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
        