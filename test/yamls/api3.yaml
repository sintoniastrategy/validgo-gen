openapi: 3.0.0
info:
  title: Sample API
  version: 1.0.0

paths:
  /path/to/resourse:
    get:
      operationId: list-resources
      summary: List resources
      responses:
        '200':
          description: Resources listed successfully
          content:
            application/json:
              schema:
                $ref: 'def.yaml#/components/schemas/NewResourseResponse'
  /path/to/resourse/{id}:
    delete:
      operationId: delete-resource
      summary: Delete resource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resource deleted successfully